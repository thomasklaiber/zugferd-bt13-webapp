services:
  app:
    image: ghcr.io/thomasklaiber/zugferd-bt13-webapp:latest
    restart: unless-stopped
    environment:
      - FLASK_ENV=production
    labels:
      - traefik.enable=true
      # HTTPS-Router
      - traefik.http.routers.zugferd-bt13.rule=Host(`zugferd-bt13.srv1528010.hstgr.cloud`)
      - traefik.http.routers.zugferd-bt13.entrypoints=websecure
      - traefik.http.routers.zugferd-bt13.tls.certresolver=letsencrypt
      # HTTP → HTTPS Redirect
      - traefik.http.routers.zugferd-bt13-http.rule=Host(`zugferd-bt13.srv1528010.hstgr.cloud`)
      - traefik.http.routers.zugferd-bt13-http.entrypoints=web
      - traefik.http.routers.zugferd-bt13-http.middlewares=zugferd-bt13-https-redirect
      - traefik.http.middlewares.zugferd-bt13-https-redirect.redirectscheme.scheme=https
      - traefik.http.middlewares.zugferd-bt13-https-redirect.redirectscheme.permanent=true
      # Interner App-Port
      - traefik.http.services.zugferd-bt13.loadbalancer.server.port=5000
    networks:
      - traefik-proxy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:5000/')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s

networks:
  traefik-proxy:
    external: true
