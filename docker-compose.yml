services:
  app:
    image: ghcr.io/thomasklaiber/zugferd-bt13-webapp:latest
    pull_policy: always
    restart: unless-stopped
    environment:
      - FLASK_ENV=production
    labels:
      - traefik.enable=true

      # ── Hauptdomain: zugferd-bt13.cloud (HTTPS) ──────────────────────────────
      - traefik.http.routers.zugferd-bt13.rule=Host(`zugferd-bt13.cloud`)
      - traefik.http.routers.zugferd-bt13.entrypoints=websecure
      - traefik.http.routers.zugferd-bt13.tls.certresolver=letsencrypt
      - traefik.http.routers.zugferd-bt13.service=zugferd-bt13-svc

      # ── Hauptdomain: HTTP → HTTPS ─────────────────────────────────────────────
      - traefik.http.routers.zugferd-bt13-http.rule=Host(`zugferd-bt13.cloud`)
      - traefik.http.routers.zugferd-bt13-http.entrypoints=web
      - traefik.http.routers.zugferd-bt13-http.middlewares=redirect-to-https
      - traefik.http.middlewares.redirect-to-https.redirectscheme.scheme=https
      - traefik.http.middlewares.redirect-to-https.redirectscheme.permanent=true

      # ── www.zugferd-bt13.cloud → zugferd-bt13.cloud (HTTPS, 301) ─────────────
      - traefik.http.routers.zugferd-bt13-www.rule=Host(`www.zugferd-bt13.cloud`)
      - traefik.http.routers.zugferd-bt13-www.entrypoints=websecure
      - traefik.http.routers.zugferd-bt13-www.tls.certresolver=letsencrypt
      - traefik.http.routers.zugferd-bt13-www.middlewares=redirect-www-to-apex
      - traefik.http.middlewares.redirect-www-to-apex.redirectregex.regex=^https://www\\.zugferd-bt13\\.cloud/(.*)
      - traefik.http.middlewares.redirect-www-to-apex.redirectregex.replacement=https://zugferd-bt13.cloud/$${1}
      - traefik.http.middlewares.redirect-www-to-apex.redirectregex.permanent=true

      # ── www HTTP → HTTPS (damit Let's Encrypt Challenge funktioniert) ─────────
      - traefik.http.routers.zugferd-bt13-www-http.rule=Host(`www.zugferd-bt13.cloud`)
      - traefik.http.routers.zugferd-bt13-www-http.entrypoints=web
      - traefik.http.routers.zugferd-bt13-www-http.middlewares=redirect-to-https

      # ── Alte Hostinger-Subdomain → zugferd-bt13.cloud (301) ──────────────────
      - traefik.http.routers.zugferd-bt13-legacy.rule=Host(`zugferd-bt13.srv1528010.hstgr.cloud`)
      - traefik.http.routers.zugferd-bt13-legacy.entrypoints=websecure
      - traefik.http.routers.zugferd-bt13-legacy.tls.certresolver=letsencrypt
      - traefik.http.routers.zugferd-bt13-legacy.middlewares=redirect-legacy-to-apex
      - traefik.http.middlewares.redirect-legacy-to-apex.redirectregex.regex=^https://zugferd-bt13\\.srv1528010\\.hstgr\\.cloud/(.*)
      - traefik.http.middlewares.redirect-legacy-to-apex.redirectregex.replacement=https://zugferd-bt13.cloud/$${1}
      - traefik.http.middlewares.redirect-legacy-to-apex.redirectregex.permanent=true

      # ── Alte Hostinger-Subdomain HTTP → HTTPS ────────────────────────────────
      - traefik.http.routers.zugferd-bt13-legacy-http.rule=Host(`zugferd-bt13.srv1528010.hstgr.cloud`)
      - traefik.http.routers.zugferd-bt13-legacy-http.entrypoints=web
      - traefik.http.routers.zugferd-bt13-legacy-http.middlewares=redirect-to-https

      # ── Service (interner App-Port) ───────────────────────────────────────────
      - traefik.http.services.zugferd-bt13-svc.loadbalancer.server.port=5000

    networks:
      - traefik-proxy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:5000/')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s

networks:
  traefik-proxy:
    external: true
